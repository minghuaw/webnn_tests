<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – conv2d + add + relu</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – conv2d + add + relu</h1>
  <p>conv2d [1,2,5,5] w/ [3,2,3,3] → [1,3,3,3], add [1,3,3,3], then relu. Residual block pattern.</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // conv2d + add + relu (residual block basic building block)
      // Input: [1, 2, 5, 5] NCHW, all ones
      // Filter: [3, 2, 3, 3] OIHW, all ones (constant)
      // conv2d → [1, 3, 3, 3], each = 2 * 3 * 3 = 18
      // Addend: [1, 3, 3, 3] all ones → each = 19
      // relu: identity for positive values → each = 19
      try {
        const b = new MLGraphBuilder(context);
        const iD = { dataType: 'float32', shape: [1, 2, 5, 5] };
        const fD = { dataType: 'float32', shape: [3, 2, 3, 3] };
        const aD = { dataType: 'float32', shape: [1, 3, 3, 3] };
        const x = b.input('x', iD);
        const f = b.constant(fD, new Float32Array(3 * 2 * 3 * 3).fill(1));
        const a = b.input('a', aD);
        const conv = b.conv2d(x, f, { padding: [0, 0, 0, 0], strides: [1, 1], inputLayout: 'nchw', filterLayout: 'oihw' });
        const sum = b.add(conv, a);
        const o = b.relu(sum);
        const g = await b.build({ o });
        const xT = await context.createTensor({ dataType: 'float32', shape: iD.shape, writable: true, readable: false });
        const aT = await context.createTensor({ dataType: 'float32', shape: aD.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(xT, new Float32Array(1 * 2 * 5 * 5).fill(1));
        context.writeTensor(aT, new Float32Array(1 * 3 * 3 * 3).fill(1));
        context.dispatch(g, { x: xT, a: aT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const exp = 19; // 18 (conv) + 1 (addend), relu is identity for positive
        const firstFew = Array.from(r.slice(0, 5)).map(v => v.toFixed(1));
        const allMatch = r.every(v => Math.abs(v - exp) < 1e-5);
        log('conv2d+add+relu', allMatch,
          `Output shape: [${o.shape}], first 5: [${firstFew.join(', ')}], expected each: ${exp}`);
        g.destroy(); xT.destroy(); aT.destroy(); oT.destroy();
      } catch (e) {
        log('conv2d+add+relu', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
