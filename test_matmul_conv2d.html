<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – matmul + conv2d</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – matmul + conv2d</h1>
  <p>matmul [1,12] @ [12,75] → [1,75], reshape → [1,3,5,5], conv2d with [2,3,3,3] → [1,2,3,3].</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // matmul + conv2d (fc → conv)
      // a: [1, 12] all ones, b: [12, 75] all ones
      // matmul → [1, 75] each = 12
      // reshape → [1, 3, 5, 5] each = 12
      // conv2d with filter [2, 3, 3, 3] OIHW, all ones (constant)
      // output: [1, 2, 3, 3], each = 12 * 3 * 3 * 3 = 324
      try {
        const b = new MLGraphBuilder(context);
        const aD = { dataType: 'float32', shape: [1, 12] };
        const bD = { dataType: 'float32', shape: [12, 75] };
        const fD = { dataType: 'float32', shape: [2, 3, 3, 3] };
        const a = b.input('a', aD);
        const c = b.input('c', bD);
        const m = b.matmul(a, c);
        const r = b.reshape(m, [1, 3, 5, 5]);
        const f = b.constant(fD, new Float32Array(2 * 3 * 3 * 3).fill(1));
        const o = b.conv2d(r, f, { padding: [0, 0, 0, 0], strides: [1, 1], inputLayout: 'nchw', filterLayout: 'oihw' });
        const g = await b.build({ o });
        const aT = await context.createTensor({ dataType: 'float32', shape: aD.shape, writable: true, readable: false });
        const cT = await context.createTensor({ dataType: 'float32', shape: bD.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(aT, new Float32Array(1 * 12).fill(1));
        context.writeTensor(cT, new Float32Array(12 * 75).fill(1));
        context.dispatch(g, { a: aT, c: cT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r_ = new Float32Array(buf);
        const exp = 324; // 12 (matmul) * 3 ch * 3*3 kernel
        const firstFew = Array.from(r_.slice(0, 5)).map(v => v.toFixed(1));
        const allMatch = r_.every(v => Math.abs(v - exp) < 1e-5);
        log('matmul+conv2d', allMatch,
          `Output shape: [${o.shape}], first 5: [${firstFew.join(', ')}], expected each: ${exp}`);
        g.destroy(); aT.destroy(); cT.destroy(); oT.destroy();
      } catch (e) {
        log('matmul+conv2d', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
