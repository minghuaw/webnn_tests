<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – Tensor Manipulation</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – Tensor Manipulation</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    function arraysMatch(a, b, tol) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (tol === 0) { if (a[i] !== b[i]) return false; }
        else { if (Math.abs(a[i] - b[i]) > tol) return false; }
      }
      return true;
    }

    async function runWithContext(name, fn) {
      let context;
      try {
        context = await navigator.ml.createContext({});
        await fn(context);
        context.destroy();
      } catch (e) {
        if (context) context.destroy();
        log(name, false, e.message);
      }
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      // 1  concat — three 1x3 tensors along axis=0 → [3, 3]
      // https://pytorch.org/docs/stable/generated/torch.cat.html
      await runWithContext('concat', async (context) => {
        const b = new MLGraphBuilder(context);
        const d = { dataType: 'float32', shape: [1, 3] };
        const a1 = b.input('a1', d); const a2 = b.input('a2', d); const a3 = b.input('a3', d);
        const o = b.concat([a1, a2, a3], 0);
        const g = await b.build({ o });
        const t1 = await context.createTensor({ dataType: 'float32', shape: [1, 3], writable: true, readable: false });
        const t2 = await context.createTensor({ dataType: 'float32', shape: [1, 3], writable: true, readable: false });
        const t3 = await context.createTensor({ dataType: 'float32', shape: [1, 3], writable: true, readable: false });
        const to = await context.createTensor({ dataType: 'float32', shape: [3, 3], writable: false, readable: true });
        context.writeTensor(t1, new Float32Array([1, 2, 3]));
        context.writeTensor(t2, new Float32Array([4, 5, 6]));
        context.writeTensor(t3, new Float32Array([7, 8, 9]));
        context.dispatch(g, { a1: t1, a2: t2, a3: t3 }, { o: to });
        const buf = await context.readTensor(to);
        const r = new Float32Array(buf);
        log('concat', arraysMatch(r, new Float32Array([1, 2, 3, 4, 5, 6, 7, 8, 9]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); t1.destroy(); t2.destroy(); t3.destroy(); to.destroy();
      });

      // 2  expand — [1, 3] -> [2, 3] by broadcasting dim 0
      // https://pytorch.org/docs/stable/generated/torch.Tensor.expand.html
      await runWithContext('expand', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [1, 3] });
        const o = b.expand(x, [2, 3]);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [1, 3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [2, 3], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([10, 20, 30]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('expand', arraysMatch(r, new Float32Array([10, 20, 30, 10, 20, 30]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 3  reshape — [2, 3] -> [6]
      // https://pytorch.org/docs/stable/generated/torch.reshape.html
      await runWithContext('reshape', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [2, 3] });
        const o = b.reshape(x, [6]);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [2, 3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [6], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4, 5, 6]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('reshape', arraysMatch(r, new Float32Array([1, 2, 3, 4, 5, 6]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 4  reverse — [1, 2, 3] along axis 0 → [3, 2, 1]
      // https://pytorch.org/docs/stable/generated/torch.flip.html
      await runWithContext('reverse', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [3] });
        const o = b.reverse(x, { axes: [0] });
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [3], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('reverse', arraysMatch(r, new Float32Array([3, 2, 1]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 5  slice — [1, 2, 3, 4, 5] from index 1 size 3 → [2, 3, 4]
      // https://pytorch.org/docs/stable/generated/torch.slice.html
      await runWithContext('slice', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [5] });
        const o = b.slice(x, [1], [3]);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [5], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [3], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4, 5]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('slice', arraysMatch(r, new Float32Array([2, 3, 4]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 6  split — [1,2,3,4,5,6] into 3 chunks of size 2
      // https://pytorch.org/docs/stable/generated/torch.split.html
      await runWithContext('split', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [6] });
        const outs = b.split(x, 3);
        const named = {};
        outs.forEach((o, i) => { named['o' + i] = o; });
        const g = await b.build(named);
        const iT = await context.createTensor({ dataType: 'float32', shape: [6], writable: true, readable: false });
        const t0 = await context.createTensor({ dataType: 'float32', shape: [2], writable: false, readable: true });
        const t1 = await context.createTensor({ dataType: 'float32', shape: [2], writable: false, readable: true });
        const t2 = await context.createTensor({ dataType: 'float32', shape: [2], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4, 5, 6]));
        context.dispatch(g, { x: iT }, { o0: t0, o1: t1, o2: t2 });
        const b0 = await context.readTensor(t0);
        const b1 = await context.readTensor(t1);
        const b2 = await context.readTensor(t2);
        const r0 = new Float32Array(b0); const r1 = new Float32Array(b1); const r2 = new Float32Array(b2);
        log('split', arraysMatch(r0, [1, 2], 1e-5) && arraysMatch(r1, [3, 4], 1e-5) && arraysMatch(r2, [5, 6], 1e-5),
          `Chunks: [${Array.from(r0).join(', ')}], [${Array.from(r1).join(', ')}], [${Array.from(r2).join(', ')}]`);
        g.destroy(); iT.destroy(); t0.destroy(); t1.destroy(); t2.destroy();
      });

      // 7  tile — [1, 2, 3] repeated 2 times → [1, 2, 3, 1, 2, 3]
      // https://pytorch.org/docs/stable/generated/torch.tile.html
      await runWithContext('tile', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [3] });
        const o = b.tile(x, [2]);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [6], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('tile', arraysMatch(r, new Float32Array([1, 2, 3, 1, 2, 3]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 8  transpose — [[1,2],[3,4]] with permutation [1,0] → [[1,3],[2,4]]
      // https://pytorch.org/docs/stable/generated/torch.transpose.html
      await runWithContext('transpose', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [2, 2] });
        const o = b.transpose(x, { permutation: [1, 0] });
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('transpose', arraysMatch(r, new Float32Array([1, 3, 2, 4]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 9  triangular (upper) — extracts upper triangle
      // https://pytorch.org/docs/stable/generated/torch.triu.html
      await runWithContext('triangular (upper)', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [3, 3] });
        const o = b.triangular(x, { upper: true });
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [3, 3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [3, 3], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4, 5, 6, 7, 8, 9]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('triangular (upper)', arraysMatch(r, new Float32Array([1, 2, 3, 0, 5, 6, 0, 0, 9]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 10  pad — constant padding
      // https://pytorch.org/docs/stable/generated/torch.nn.functional.pad.html
      await runWithContext('pad', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [2, 2] });
        const o = b.pad(x, [1, 1], [1, 1]);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [4, 4], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('pad', arraysMatch(r, new Float32Array([0, 0, 0, 0, 0, 1, 2, 0, 0, 3, 4, 0, 0, 0, 0, 0]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 11  cast — float32 → int32
      // https://pytorch.org/docs/stable/generated/torch.Tensor.to.html
      await runWithContext('cast', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [4] });
        const o = b.cast(x, 'int32');
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [4], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'int32', shape: [4], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1.5, 2.7, -3.2, 4.0]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Int32Array(buf);
        log('cast (float32→int32)', arraysMatch(r, new Int32Array([1, 2, -3, 4]), 0),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 12  where — conditional selection
      // https://pytorch.org/docs/stable/generated/torch.where.html
      await runWithContext('where', async (context) => {
        const b = new MLGraphBuilder(context);
        const cond = b.input('cond', { dataType: 'uint8', shape: [3] });
        const tVal = b.input('t', { dataType: 'float32', shape: [3] });
        const fVal = b.input('f', { dataType: 'float32', shape: [3] });
        const o = b.where(cond, tVal, fVal);
        const g = await b.build({ o });
        const cT = await context.createTensor({ dataType: 'uint8', shape: [3], writable: true, readable: false });
        const tT = await context.createTensor({ dataType: 'float32', shape: [3], writable: true, readable: false });
        const fT = await context.createTensor({ dataType: 'float32', shape: [3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [3], writable: false, readable: true });
        context.writeTensor(cT, new Uint8Array([1, 0, 1]));
        context.writeTensor(tT, new Float32Array([10, 20, 30]));
        context.writeTensor(fT, new Float32Array([40, 50, 60]));
        context.dispatch(g, { cond: cT, t: tT, f: fT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('where', arraysMatch(r, new Float32Array([10, 50, 30]), 1e-5),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); cT.destroy(); tT.destroy(); fT.destroy(); oT.destroy();
      });

      // 13  matmul
      // https://pytorch.org/docs/stable/generated/torch.matmul.html
      await runWithContext('matmul', async (context) => {
        const b = new MLGraphBuilder(context);
        const a = b.input('a', { dataType: 'float32', shape: [2, 2] });
        const c = b.input('c', { dataType: 'float32', shape: [2, 2] });
        const o = b.matmul(a, c);
        const g = await b.build({ o });
        const aT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const cT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: false, readable: true });
        context.writeTensor(aT, new Float32Array([1, 2, 3, 4]));
        context.writeTensor(cT, new Float32Array([5, 6, 7, 8]));
        context.dispatch(g, { a: aT, c: cT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('matmul', arraysMatch(r, new Float32Array([19, 22, 43, 50]), 1e-4),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); aT.destroy(); cT.destroy(); oT.destroy();
      });

      // 14  gemm (alpha*a*b + beta*c)
      // https://pytorch.org/docs/stable/generated/torch.addmm.html
      await runWithContext('gemm', async (context) => {
        const b = new MLGraphBuilder(context);
        const aM = b.input('a', { dataType: 'float32', shape: [2, 2] });
        const bM = b.input('b', { dataType: 'float32', shape: [2, 2] });
        const o = b.gemm(aM, bM, { alpha: 1, beta: 0 });
        const g = await b.build({ o });
        const aT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const bT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [2, 2], writable: false, readable: true });
        context.writeTensor(aT, new Float32Array([1, 2, 3, 4]));
        context.writeTensor(bT, new Float32Array([5, 6, 7, 8]));
        context.dispatch(g, { a: aT, b: bT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        log('gemm', arraysMatch(r, new Float32Array([19, 22, 43, 50]), 1e-4),
          `Got: [${Array.from(r).join(', ')}]`);
        g.destroy(); aT.destroy(); bT.destroy(); oT.destroy();
      });

      // 15  resample2d — nearest-neighbor upscale 2x
      // https://pytorch.org/docs/stable/generated/torch.nn.functional.interpolate.html
      await runWithContext('resample2d', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [1, 1, 2, 2] });
        const o = b.resample2d(x, { scales: [2, 2], mode: 'nearest-neighbor', axes: [2, 3] });
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [1, 1, 2, 2], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [1, 1, 4, 4], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const exp = new Float32Array([1, 1, 2, 2, 1, 1, 2, 2, 3, 3, 4, 4, 3, 3, 4, 4]);
        log('resample2d', arraysMatch(r, exp, 1e-5), `Got shape: [${o.shape}]`);
        g.destroy(); iT.destroy(); oT.destroy();
      });

      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
