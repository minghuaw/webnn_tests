<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – conv2d + transpose</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – conv2d + transpose</h1>
  <p>NCHW conv2d [1,2,8,8] → transpose NHWC [1,8,8,3]. Tests output layout conversion after convolution.</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // conv2d + transpose
      // Input: [1, 2, 8, 8] NCHW, all ones
      // Filter: [3, 2, 3, 3] all ones (constant)
      // Bias: [1, 2, 3] (constant)
      // Padding: [1,1,1,1], stride: [1,1]
      //   → [1, 3, 8, 8], interior = 2*3*3 = 18 + bias → [19, 20, 21]
      //   Corner (0,0): 2*2 = 4 cells per input_ch, 2 input_ch = 8 + bias → [9, 10, 11]
      // Transpose: [0, 2, 3, 1] (NCHW → NHWC)
      //   → [1, 8, 8, 3]
      try {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', { dataType: 'float32', shape: [1, 2, 8, 8] });
        const f = b.constant({ dataType: 'float32', shape: [3, 2, 3, 3] }, new Float32Array(54).fill(1));
        const bias = b.constant({ dataType: 'float32', shape: [3] }, new Float32Array([1, 2, 3]));
        const c = b.conv2d(x, f, { padding: [1, 1, 1, 1], strides: [1, 1], bias, inputLayout: 'nchw', filterLayout: 'oihw' });
        const o = b.transpose(c, { permutation: [0, 2, 3, 1] });
        const g = await b.build({ o });
        const xT = await context.createTensor({ dataType: 'float32', shape: [1, 2, 8, 8], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(xT, new Float32Array(128).fill(1));
        context.dispatch(g, { x: xT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);

        const S = o.shape; // [1, 8, 8, 3]
        const idx = (h, w, ch) => h * S[2] * S[3] + w * S[3] + ch;
        const checks = [
          // corner: h_live=2, w_live=2 → 4 cells/ch × 2ch = 8 + bias
          [r[idx(0, 0, 0)], 9, 'corner ch0'],
          [r[idx(0, 0, 1)], 10, 'corner ch1'],
          [r[idx(0, 0, 2)], 11, 'corner ch2'],
          // interior: h_live=3, w_live=3 → 9 cells/ch × 2ch = 18 + bias
          [r[idx(4, 4, 0)], 19, 'interior ch0'],
          [r[idx(4, 4, 1)], 20, 'interior ch1'],
          [r[idx(4, 4, 2)], 21, 'interior ch2'],
        ];
        const allOk = checks.every(([got, exp]) => Math.abs(got - exp) < 1e-5);
        log('conv2d_transpose', allOk,
          `shape=[${S}], corner ch0=${r[idx(0,0,0)].toFixed(0)}/${9} ch1=${r[idx(0,0,1)].toFixed(0)}/${10} ch2=${r[idx(0,0,2)].toFixed(0)}/${11}, interior ch0=${r[idx(4,4,0)].toFixed(0)}/${19}`);
        if (!allOk) {
          const fails = checks.filter(([got, exp]) => Math.abs(got - exp) >= 1e-5);
          fails.forEach(([got, exp, name]) =>
            log('  ' + name, false, `got ${got.toFixed(1)}, exp ${exp}`));
        }
        g.destroy(); xT.destroy(); oT.destroy();
      } catch (e) {
        log('conv2d_transpose', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
