<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – transpose + reshape + conv2d + relu + reshape + depthwise (asymmetric padding)</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – transpose + reshape + conv2d + relu + reshape + depthwise (asymmetric padding)</h1>
  <p>NHWC→NCHW → conv2d pad=[1,2,1,2] stride=2 → relu → depthwise pad=[1,1,1,1] stride=2 groups=4.</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // transpose + reshape (identity) + conv2d + relu + reshape (identity) + depthwise conv2d
      // Input: NHWC [1, 128, 128, 3] all ones
      // Transpose → NCHW [1, 3, 128, 128]
      // Reshape identity → [1, 3, 128, 128]
      // Conv2d #1: filter [4, 3, 3, 3] all ones, bias [1,2,3,4], padding=[1,2,1,2], strides=[2,2]
      //   → [1, 4, 65, 65], interior each = 3*3*3 = 27 + bias
      // Relu: identity for positive
      // Reshape identity → [1, 4, 65, 65]
      // Depthwise: filter [4, 1, 3, 3] all ones, bias [10,20,30,40], padding=[1,1,1,1], strides=[2,2], groups=4
      //   → [1, 4, 33, 33], ch0 center = (27+1)*9 + 10 = 262, corner = 89
      try {
        const b = new MLGraphBuilder(context);
        const iD = { dataType: 'float32', shape: [1, 128, 128, 3] };
        const f1D = { dataType: 'float32', shape: [4, 3, 3, 3] };
        const f2D = { dataType: 'float32', shape: [4, 1, 3, 3] };
        const x = b.input('x', iD);
        const t = b.transpose(x, { permutation: [0, 3, 1, 2] });
        const r1 = b.reshape(t, [1, 3, 128, 128]);
        const f1 = b.constant(f1D, new Float32Array(4 * 3 * 3 * 3).fill(1));
        const b1 = b.constant({ dataType: 'float32', shape: [4] }, new Float32Array([1, 2, 3, 4]));
        const c1 = b.conv2d(r1, f1, { padding: [1, 2, 1, 2], strides: [2, 2], bias: b1, inputLayout: 'nchw', filterLayout: 'oihw' });
        const r2 = b.relu(c1);
        const r3 = b.reshape(r2, r2.shape);
        const f2 = b.constant(f2D, new Float32Array(4 * 1 * 3 * 3).fill(1));
        const b2 = b.constant({ dataType: 'float32', shape: [4] }, new Float32Array([10, 20, 30, 40]));
        const o = b.conv2d(r3, f2, { padding: [1, 1, 1, 1], strides: [2, 2], bias: b2, groups: 4, inputLayout: 'nchw', filterLayout: 'oihw' });
        const g = await b.build({ o });
        const xT = await context.createTensor({ dataType: 'float32', shape: iD.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(xT, new Float32Array(1 * 128 * 128 * 3).fill(1));
        context.dispatch(g, { x: xT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r_ = new Float32Array(buf);
        const S = o.shape[2]; // 33
        const centerIdx = 0 * S * S + 16 * S + 16;
        const cornerIdx = 0 * S * S + 0 * S + 0;
        const centerExp = 262;
        const cornerExp = 89; // (2*2*3+1)+(2*3*3+1)+(3*2*3+1)+(3*3*3+1) + 10 = 13+19+19+28+10
        const shapeOk = o.shape.length === 4 && o.shape[0] === 1 && o.shape[1] === 4 && o.shape[2] === S && o.shape[3] === S;
        const centerOk = Math.abs(r_[centerIdx] - centerExp) < 1e-5;
        const cornerOk = Math.abs(r_[cornerIdx] - cornerExp) < 1e-5;
        log('asym_chain_center', centerOk,
          `Ch0 center[16,16]: ${r_[centerIdx].toFixed(1)}, expected ${centerExp}`);
        log('asym_chain_corner', cornerOk,
          `Ch0 corner[0,0]: ${r_[cornerIdx].toFixed(1)}, expected ${cornerExp} (symmetric would be 62)`);
        g.destroy(); xT.destroy(); oT.destroy();
      } catch (e) {
        log('asym_chain', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
