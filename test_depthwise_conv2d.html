<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – depthwise conv2d</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – depthwise conv2d</h1>
  <p>Depthwise conv2d [1,24,64,64] with [24,1,3,3] filter, groups=24. Each input channel convolved independently.</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // depthwise conv2d (groups = input channels)
      // Input: [1, 24, 64, 64] NCHW, all ones
      // Filter: [24, 1, 3, 3] OIHW, all ones (constant), groups = 24
      // Padding: 1 on all edges → output [1, 24, 64, 64]
      // Edge values < 9 (padded zeros), interior values = 1*3*3 = 9
      try {
        const b = new MLGraphBuilder(context);
        const iD = { dataType: 'float32', shape: [1, 24, 64, 64] };
        const fD = { dataType: 'float32', shape: [24, 1, 3, 3] };
        const x = b.input('x', iD);
        const f = b.constant(fD, new Float32Array(24 * 1 * 3 * 3).fill(1));
        const o = b.conv2d(x, f, { padding: [1, 1, 1, 1], strides: [1, 1], groups: 24, inputLayout: 'nchw', filterLayout: 'oihw' });
        const g = await b.build({ o });
        const xT = await context.createTensor({ dataType: 'float32', shape: iD.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(xT, new Float32Array(1 * 24 * 64 * 64).fill(1));
        context.dispatch(g, { x: xT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        // interior pixel [ch0, h=32, w=32] should be 9
        const centerIdx = 0 * 64 * 64 + 32 * 64 + 32;
        const centerOk = Math.abs(r[centerIdx] - 9) < 1e-5;
        const s = `Output shape: [${o.shape}], ch0 center: ${r[centerIdx].toFixed(1)}`;
        log('depthwise_conv2d', centerOk, s);
        g.destroy(); xT.destroy(); oT.destroy();
      } catch (e) {
        log('depthwise_conv2d', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
