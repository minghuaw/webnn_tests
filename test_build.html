<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MLGraphBuilder Build Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>

    let failed = 0;
    let passedOptional = 0;
    let failedOptional = 0;

    function log(name, passed_) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      div.textContent = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    function logOptional(name, passed_) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      div.textContent = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      results.appendChild(div);
      if (passed_) passedOptional++; else failedOptional++;

        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const result = builder.argMax(a, 1);
        const graph = await builder.build({ output: result });
        log('build graph with chain: input -> argMax', graph instanceof MLGraph);
        context.destroy();

        log('build graph with chain: input -> argMax', false);
        console.error(e);
