<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MLGraphBuilder Build Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>MLGraphBuilder Build Tests</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      div.textContent = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      // Test: build graph with single output
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const input = builder.input('x', { dataType: 'float32', shape: [2, 3] });
        const graph = await builder.build({ output: input });
        log('build graph with single output', graph instanceof MLGraph);
        context.destroy();
      } catch (e) {
        log('build graph with single output', false);
        console.error(e);
      }

      // Test: build graph with chain: input -> add -> mul
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const c = builder.input('c', { dataType: 'float32', shape: [2, 3] });
        const sum = builder.add(a, b);
        const product = builder.mul(sum, c);
        const graph = await builder.build({ output: product });
        log('build graph with chain: input -> add -> mul', graph instanceof MLGraph);
        context.destroy();
      } catch (e) {
        log('build graph with chain: input -> add -> mul', false);
        console.error(e);
      }

      // Test: build graph with chain: input -> cos
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const result = builder.cos(a);
        const graph = await builder.build({ output: result });
        log('build graph with chain: input -> cos', graph instanceof MLGraph);
        context.destroy();
      } catch (e) {
        log('build graph with chain: input -> cos', false);
        console.error(e);
      }

      // Summary
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
