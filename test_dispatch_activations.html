<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – Activation & NN Operators</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – Activation & NN Operators</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    function arraysMatch(a, b, tol) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (tol === 0) { if (a[i] !== b[i]) return false; }
        else { if (Math.abs(a[i] - b[i]) > tol) return false; }
      }
      return true;
    }

    function erfApprox(x) {
      const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
      const s=x<0?-1:1; x=Math.abs(x);
      const t=1/(1+p*x);
      return s*(1-(((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)));
    }

    async function unaryTest(desc, input, buildFn, expected, tol, name, url) {
      let context;
      try {
        context = await navigator.ml.createContext({});
        const b = new MLGraphBuilder(context);
        const x = b.input('x', desc);
        const o = buildFn(b, x);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: desc.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(iT, input);
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const ok = arraysMatch(r, expected, tol);
        const s = `Got: [${Array.from(r).map(v => v.toFixed(4)).join(', ')}]`;
        if (ok) log(name, true, s); else log(name, false, `${s}, Expected: [${Array.from(expected).map(v => v.toFixed(4)).join(', ')}]`);
        g.destroy(); iT.destroy(); oT.destroy();
        context.destroy();
      } catch (e) {
        if (context) context.destroy();
        log(name, false, e.message);
      }
    }

    async function runWithContext(name, fn) {
      let context;
      try {
        context = await navigator.ml.createContext({});
        await fn(context);
        context.destroy();
      } catch (e) {
        if (context) context.destroy();
        log(name, false, e.message);
      }
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      const d5 = { dataType: 'float32', shape: [5] };
      const d10 = { dataType: 'float32', shape: [10] };

      // 1 relu
      // https://github.com/tensorflow/tensorflow/blob/master/tensorflow/core/kernels/relu_op_test.py
      await unaryTest(d10, new Float32Array([-9, 7, -5, 3, -1, 1, -3, 5, -7, 9]),
        (b, x) => b.relu(x), new Float32Array([0, 7, 0, 3, 0, 1, 0, 5, 0, 9]), 1e-5,
        'relu', 'https://github.com/tensorflow/tensorflow/blob/master/tensorflow/core/kernels/relu_op_test.py');

      // 2 leakyRelu (default alpha=0.01)
      // https://pytorch.org/docs/stable/generated/torch.nn.LeakyReLU.html
      await unaryTest(d5, new Float32Array([-3, -1, 0, 1, 3]),
        (b, x) => b.leakyRelu(x, { alpha: 0.01 }), new Float32Array([-0.03, -0.01, 0, 1, 3]), 1e-5,
        'leakyRelu', 'https://pytorch.org/docs/stable/generated/torch.nn.LeakyReLU.html');

      // 3 prelu (slope per channel, here scalar slope)
      // https://pytorch.org/docs/stable/generated/torch.nn.PReLU.html
      await runWithContext('prelu', async (context) => {
        const b = new MLGraphBuilder(context);
        const x = b.input('x', d5);
        const slope = b.constant({ dataType: 'float32', shape: [1] }, new Float32Array([0.5]));
        const o = b.prelu(x, slope);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [5], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([-3, -1, 0, 1, 3]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const exp = new Float32Array([-1.5, -0.5, 0, 1, 3]);
        const ok = arraysMatch(r, exp, 1e-5);
        const s = `Got: [${Array.from(r).map(v => v.toFixed(4)).join(', ')}]`;
        if (ok) log('prelu', true, s); else log('prelu', false, s + ', Expected: [-1.5, -0.5, 0, 1, 3]');
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 4 elu (default alpha=1)
      // https://pytorch.org/docs/stable/generated/torch.nn.ELU.html
      await unaryTest(d5, new Float32Array([-2, -1, 0, 1, 2]),
        (b, x) => b.elu(x, { alpha: 1 }),
        new Float32Array([Math.exp(-2) - 1, Math.exp(-1) - 1, 0, 1, 2]), 1e-4,
        'elu', 'https://pytorch.org/docs/stable/generated/torch.nn.ELU.html');

      // 5 gelu  (x * 0.5 * (1 + erf(x/sqrt(2))))
      // https://pytorch.org/docs/stable/generated/torch.nn.GELU.html
      {
        const inp = new Float32Array([-3, -1, 0, 1, 3]);
        const expected = new Float32Array(inp.map(v => v * 0.5 * (1 + erfApprox(v / Math.SQRT2))));
        await unaryTest(d5, inp,
          (b, x) => b.gelu(x), expected, 1e-4,
          'gelu', 'https://pytorch.org/docs/stable/generated/torch.nn.GELU.html');
      }

      // 6 hardSigmoid (default alpha=0.2, beta=0.5)
      // https://pytorch.org/docs/stable/generated/torch.nn.Hardsigmoid.html
      await unaryTest(d5, new Float32Array([-3, -1, 0, 1, 3]),
        (b, x) => b.hardSigmoid(x, { alpha: 0.2, beta: 0.5 }),
        new Float32Array([0, 0.3, 0.5, 0.7, 1]), 1e-5,
        'hardSigmoid', 'https://pytorch.org/docs/stable/generated/torch.nn.Hardsigmoid.html');

      // 7 hardSwish  (x * clamp(x/6 + 0.5, 0, 1))
      // https://pytorch.org/docs/stable/generated/torch.nn.Hardswish.html
      await unaryTest(d5, new Float32Array([-3, -1, 0, 1, 3]),
        (b, x) => b.hardSwish(x),
        new Float32Array([0, -0.3333333, 0, 0.6666667, 3]), 1e-4,
        'hardSwish', 'https://pytorch.org/docs/stable/generated/torch.nn.Hardswish.html');

      // 8 linear (default alpha=1, beta=0) — simply identity
      await unaryTest(d5, new Float32Array([1, 2, 3, 4, 5]),
        (b, x) => b.linear(x, { alpha: 2, beta: 1 }),
        new Float32Array([3, 5, 7, 9, 11]), 1e-5,
        'linear', 'https://pytorch.org/docs/stable/generated/torch.nn.Linear.html');

      // 9 sigmoid
      // https://github.com/ml-explore/mlx/blob/main/tests/test_ops.py
      {
        const inp = new Float32Array([0, 1, -1, 5, -5]);
        const expected = new Float32Array(inp.map(v => 1 / (1 + Math.exp(-v))));
        await unaryTest(d5, inp,
          (b, x) => b.sigmoid(x), expected, 1e-4,
          'sigmoid', 'https://github.com/ml-explore/mlx/blob/main/tests/test_ops.py');
      }

      // 10 softmax (axis=1)
      // https://github.com/tensorflow/tensorflow/blob/master/tensorflow/core/kernels/softmax_op_test.py
      await runWithContext('softmax', async (context) => {
        const b = new MLGraphBuilder(context);
        const d = { dataType: 'float32', shape: [2, 4] };
        const x = b.input('x', d);
        const o = b.softmax(x, 1);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [2, 4], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [2, 4], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 1, 1, 1, 1, 2, 3, 4]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        function softmaxRow(arr) { const mx = Math.max(...arr); const ex = arr.map(v => Math.exp(v - mx)); const s = ex.reduce((a, b) => a + b, 0); return ex.map(v => v / s); }
        const expected = new Float32Array([...softmaxRow([1,1,1,1]), ...softmaxRow([1,2,3,4])]);
        const ok = arraysMatch(r, expected, 1e-4);
        const s = `Got: [${Array.from(r).map(v => v.toFixed(4)).join(', ')}]`;
        if (ok) log('softmax', true, s); else log('softmax', false, s + ', Expected: [...]');
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 11 softplus
      // https://pytorch.org/docs/stable/generated/torch.nn.Softplus.html
      {
        const inp = new Float32Array([-3, -1, 0, 1, 3]);
        const expected = new Float32Array(inp.map(v => Math.log(1 + Math.exp(v))));
        await unaryTest(d5, inp,
          (b, x) => b.softplus(x), expected, 1e-4,
          'softplus', 'https://pytorch.org/docs/stable/generated/torch.nn.Softplus.html');
      }

      // 12 softsign
      // https://pytorch.org/docs/stable/generated/torch.nn.Softsign.html
      await unaryTest(d5, new Float32Array([-3, -1, 0, 1, 3]),
        (b, x) => b.softsign(x), new Float32Array([-0.75, -0.5, 0, 0.5, 0.75]), 1e-5,
        'softsign', 'https://pytorch.org/docs/stable/generated/torch.nn.Softsign.html');

      // 13 tanh
      // https://pytorch.org/docs/stable/generated/torch.nn.Tanh.html
      {
        const inp = new Float32Array([-3, -1, 0, 1, 3]);
        const expected = new Float32Array(inp.map(Math.tanh));
        await unaryTest(d5, inp,
          (b, x) => b.tanh(x), expected, 1e-4,
          'tanh', 'https://pytorch.org/docs/stable/generated/torch.nn.Tanh.html');
      }

      // 14 clamp
      // https://pytorch.org/docs/stable/generated/torch.clamp.html
      await unaryTest(d5, new Float32Array([-3, -1, 0, 1, 3]),
        (b, x) => b.clamp(x, { minValue: -1, maxValue: 2 }),
        new Float32Array([-1, -1, 0, 1, 2]), 1e-5,
        'clamp', 'https://pytorch.org/docs/stable/generated/torch.clamp.html');

      // 15 cumulativeSum
      // https://pytorch.org/docs/stable/generated/torch.cumsum.html
      await runWithContext('cumulativeSum', async (context) => {
        const b = new MLGraphBuilder(context);
        const d = { dataType: 'float32', shape: [4] };
        const x = b.input('x', d);
        const o = b.cumulativeSum(x, 0);
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: [4], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: [4], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([1, 2, 3, 4]));
        context.dispatch(g, { x: iT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const exp = new Float32Array([1, 3, 6, 10]);
        const ok = arraysMatch(r, exp, 1e-5);
        const s = `Got: [${Array.from(r).map(v => v.toFixed(4)).join(', ')}]`;
        if (ok) log('cumulativeSum', true, s); else log('cumulativeSum', false, s + ', Expected: [1, 3, 6, 10]');
        g.destroy(); iT.destroy(); oT.destroy();
      });

      // 16 argMin / argMax
      // https://pytorch.org/docs/stable/generated/torch.argmin.html
      await runWithContext('argMin/argMax', async (context) => {
        const b = new MLGraphBuilder(context);
        const d = { dataType: 'float32', shape: [5] };
        const x = b.input('x', d);
        const oMin = b.argMin(x, 0);
        const oMax = b.argMax(x, 0);
        const g = await b.build({ min: oMin, max: oMax });
        const iT = await context.createTensor({ dataType: 'float32', shape: [5], writable: true, readable: false });
        const tMin = await context.createTensor({ dataType: 'int32', shape: [], writable: false, readable: true });
        const tMax = await context.createTensor({ dataType: 'int32', shape: [], writable: false, readable: true });
        context.writeTensor(iT, new Float32Array([5, 2, 8, 1, 9]));
        context.dispatch(g, { x: iT }, { min: tMin, max: tMax });
        const bufMin = await context.readTensor(tMin);
        const bufMax = await context.readTensor(tMax);
        const rMin = new Int32Array(bufMin);
        const rMax = new Int32Array(bufMax);
        const okMin = rMin[0] === 3;
        const okMax = rMax[0] === 4;
        if (okMin) log('argMin', true, `Got: ${rMin[0]}`); else log('argMin', false, `Got: ${rMin[0]}, Expected: 3`);
        if (okMax) log('argMax', true, `Got: ${rMax[0]}`); else log('argMax', false, `Got: ${rMax[0]}, Expected: 4`);
        g.destroy(); iT.destroy(); tMin.destroy(); tMax.destroy();
      });

      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
