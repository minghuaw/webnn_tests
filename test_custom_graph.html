<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – custom graph (transpose+conv2d+relu+depthwise)</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – custom graph</h1>
  <p>NHWC→NCHW → conv2d [24,3,5,5] pad=[1,2,1,2] stride=2 → relu → depthwise [24,1,3,3] pad=1 groups=24.</p>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // Custom graph: transpose + conv2d + relu + deepthwise conv2d
      // Input: [1, 128, 128, 3] NHWC, all ones
      // All weights = 1, all biases = 1
      try {
        const b = new MLGraphBuilder(context);
        const input = b.input('input', { dataType: 'float32', shape: [1, 128, 128, 3] });

        const w408_shape = [24, 3, 5, 5];
        const w440_shape = [24];
        const w479_shape = [24, 1, 3, 3];
        const w398_shape = [24];

        const w408 = b.constant({ dataType: 'float32', shape: w408_shape }, new Float32Array(24 * 3 * 5 * 5).fill(1));
        const w440 = b.constant({ dataType: 'float32', shape: w440_shape }, new Float32Array(24).fill(1));
        const w479 = b.constant({ dataType: 'float32', shape: w479_shape }, new Float32Array(24 * 1 * 3 * 3).fill(1));
        const w398 = b.constant({ dataType: 'float32', shape: w398_shape }, new Float32Array(24).fill(1));

        const t = b.transpose(input, { permutation: [0, 3, 1, 2] });
        const r = b.reshape(t, [1, 3, 128, 128]);
        const c = b.conv2d(r, w408, { padding: [1, 2, 1, 2], strides: [2, 2], bias: w440, inputLayout: 'nchw', filterLayout: 'oihw' });
        const a = b.relu(c);
        const rd = b.reshape(a, a.shape);
        const out = b.conv2d(rd, w479, { padding: [1, 1, 1, 1], strides: [1, 1], groups: 24, bias: w398, inputLayout: 'nchw', filterLayout: 'oihw' });

        const g = await b.build({ out });
        const iT = await context.createTensor({ dataType: 'float32', shape: [1, 128, 128, 3], writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: out.shape, writable: false, readable: true });
        context.writeTensor(iT, new Float32Array(1 * 128 * 128 * 3).fill(1));
        context.dispatch(g, { input: iT }, { out: oT });
        const buf = await context.readTensor(oT);
        const r_ = new Float32Array(buf);
        // Conv2d #1 interior (oh in [1,62]): each = 3*5*5 + 1 = 76
        // Depthwise center (oh=32): each = 76*3*3 + 1 = 685
        const spatial = a.shape[2];
        const half = Math.floor(spatial / 2);
        const centerIdx = 0 * spatial * spatial + half * spatial + half;
        const exp = 685;
        const shapeOk = out.shape.length === 4 && out.shape[0] === 1 && out.shape[1] === 24 && out.shape[2] === spatial && out.shape[3] === spatial;
        const centerOk = Math.abs(r_[centerIdx] - exp) < 1e-5;
        log('custom_graph', shapeOk && centerOk,
          `Output shape: [${out.shape}], ch0 center: ${r_[centerIdx].toFixed(1)}, expected: ${exp}`);
        g.destroy(); iT.destroy(); oT.destroy();
      } catch (e) {
        log('custom_graph', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
