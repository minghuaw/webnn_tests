<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MLGraphBuilder Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>MLGraphBuilder Tests</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      div.textContent = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      // Test: create builder with valid context
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        log('create builder with valid context', builder instanceof MLGraphBuilder);
        context.destroy();
      } catch (e) {
        log('create builder with valid context', false);
        console.error(e);
      }

      // Test: create builder with null context
      try {
        new MLGraphBuilder(null);
        log('create builder with null context', false);
      } catch (e) {
        log('create builder with null context', e instanceof TypeError);
      }

      // Test: create builder with destroyed context
      try {
        const context = await navigator.ml.createContext({});
        context.destroy();
        await context.lost;
        new MLGraphBuilder(context);
        log('create builder with destroyed context', false);
      } catch (e) {
        log('create builder with destroyed context', e.name === 'InvalidStateError');
      }

      // Summary
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
