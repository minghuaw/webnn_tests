<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MLGraphBuilder Operators Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>MLGraphBuilder Operators Tests</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      div.textContent = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      // Test: input with 0-D scalar
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const operand = builder.input('x', { dataType: 'float32', shape: [] });
        const ok = operand instanceof MLOperand && operand.dataType === 'float32' && 
                   operand.shape.length === 0;
        log('input with 0-D scalar', ok);
        context.destroy();
      } catch (e) {
        log('input with 0-D scalar', false);
        console.error(e);
      }

      // Test: input with 2-D shape
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const operand = builder.input('x', { dataType: 'float32', shape: [2, 3] });
        const ok = operand instanceof MLOperand && operand.dataType === 'float32' &&
                   operand.shape[0] === 2 && operand.shape[1] === 3;
        log('input with 2-D shape', ok);
        context.destroy();
      } catch (e) {
        log('input with 2-D shape', false);
        console.error(e);
      }

      // Test: input with empty name
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        builder.input('', { dataType: 'float32', shape: [1] });
        log('input with empty name', false);
        context.destroy();
      } catch (e) {
        log('input with empty name', e instanceof TypeError);
      }

      // Test: input with dimension 0
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        builder.input('x', { dataType: 'float32', shape: [0] });
        log('input with dimension 0', false);
        context.destroy();
      } catch (e) {
        log('input with dimension 0', e instanceof TypeError);
      }

      // Test: add two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.add(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('add two operands', ok);
        context.destroy();
      } catch (e) {
        log('add two operands', false);
        console.error(e);
      }

      // Test: mul two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.mul(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('mul two operands', ok);
        context.destroy();
      } catch (e) {
        log('mul two operands', false);
        console.error(e);
      }

      // Test: cos operator
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const result = builder.cos(a);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('cos operator', ok);
        context.destroy();
       } catch (e) {
        log('cos operator', false);
        console.error(e);
      }

      // Test: sub two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.sub(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('sub two operands', ok);
        context.destroy();
      } catch (e) {
        log('sub two operands', false);
        console.error(e);
      }

      // Test: div two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.div(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('div two operands', ok);
        context.destroy();
      } catch (e) {
        log('div two operands', false);
        console.error(e);
      }

      // Test: max two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.max(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('max two operands', ok);
        context.destroy();
      } catch (e) {
        log('max two operands', false);
        console.error(e);
      }

      // Test: min two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.min(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('min two operands', ok);
        context.destroy();
      } catch (e) {
        log('min two operands', false);
        console.error(e);
      }

      // Test: pow two operands
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.pow(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'float32' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('pow two operands', ok);
        context.destroy();
      } catch (e) {
        log('pow two operands', false);
        console.error(e);
      }

      // Test: equal two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.equal(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('equal two operands', ok);
        context.destroy();
      } catch (e) {
        log('equal two operands', false);
        console.error(e);
      }

      // Test: notEqual two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.notEqual(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('notEqual two operands', ok);
        context.destroy();
      } catch (e) {
        log('notEqual two operands', false);
        console.error(e);
      }

      // Test: greater two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.greater(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('greater two operands', ok);
        context.destroy();
      } catch (e) {
        log('greater two operands', false);
        console.error(e);
      }

      // Test: greaterOrEqual two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.greaterOrEqual(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('greaterOrEqual two operands', ok);
        context.destroy();
      } catch (e) {
        log('greaterOrEqual two operands', false);
        console.error(e);
      }

      // Test: lesser two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.lesser(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('lesser two operands', ok);
        context.destroy();
      } catch (e) {
        log('lesser two operands', false);
        console.error(e);
      }

      // Test: lesserOrEqual two operands (output uint8)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'float32', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'float32', shape: [2, 3] });
        const result = builder.lesserOrEqual(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('lesserOrEqual two operands', ok);
        context.destroy();
      } catch (e) {
        log('lesserOrEqual two operands', false);
        console.error(e);
      }

      // Test: logicalAnd two operands (uint8 inputs and output)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'uint8', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'uint8', shape: [2, 3] });
        const result = builder.logicalAnd(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('logicalAnd two operands', ok);
        context.destroy();
      } catch (e) {
        log('logicalAnd two operands', false);
        console.error(e);
      }

      // Test: logicalOr two operands (uint8 inputs and output)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'uint8', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'uint8', shape: [2, 3] });
        const result = builder.logicalOr(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('logicalOr two operands', ok);
        context.destroy();
      } catch (e) {
        log('logicalOr two operands', false);
        console.error(e);
      }

      // Test: logicalXor two operands (uint8 inputs and output)
      try {
        const context = await navigator.ml.createContext({});
        const builder = new MLGraphBuilder(context);
        const a = builder.input('a', { dataType: 'uint8', shape: [2, 3] });
        const b = builder.input('b', { dataType: 'uint8', shape: [2, 3] });
        const result = builder.logicalXor(a, b);
        const ok = result instanceof MLOperand && result.dataType === 'uint8' &&
                   result.shape[0] === 2 && result.shape[1] === 3;
        log('logicalXor two operands', ok);
        context.destroy();
      } catch (e) {
        log('logicalXor two operands', false);
        console.error(e);
      }

      // Summary
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
