<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MLTensor Tests - Following Official Example</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>MLTensor Tests (Following Official Example Pattern)</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      // Check if WebNN API is available
      if (!navigator.ml) {
        log('WebNN API not available', false, 'navigator.ml is undefined');
        showSummary();
        return;
      }
      log('WebNN API available', true);

      // Check secure context (WebNN requires HTTPS or localhost)
      if (!window.isSecureContext) {
        log('Not in secure context', false, 'WebNN requires HTTPS or localhost. File:// URLs will not work.');
        showSummary();
        return;
      }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({ deviceType: 'cpu' });
        log('Context created', true, 'deviceType: cpu');
      } catch (e) {
        log('Failed to create context', false, e.message);
        showSummary();
        return;
      }

      // Test 1: createTensor with WRITE usage
      let writeTensor;
      try {
        const desc = {
          dataType: 'float32',
          dimensions: [2, 3],
          shape: [2, 3],
          usage: window.MLTensorUsage ? window.MLTensorUsage.WRITE : 'write',
          writable: true
        };
        
        // According to example: createTensor returns a Promise
        writeTensor = await context.createTensor(desc);
        log('createTensor (WRITE)', true, `Created tensor with shape [${writeTensor.shape}]`);
      } catch (e) {
        log('createTensor (WRITE) failed', false, e.message);
        context.destroy();
        showSummary();
        return;
      }

      // Test 2: writeTensor
      try {
        const buffer = new Float32Array([1, 2, 3, 4, 5, 6]);
        context.writeTensor(writeTensor, buffer);
        log('writeTensor', true, 'Wrote 6 float32 values');
      } catch (e) {
        log('writeTensor failed', false, e.message);
        context.destroy();
        showSummary();
        return;
      }

      // Test 3: createTensor with READ usage
      let readTensor;
      try {
        const desc = {
          dataType: 'float32',
          dimensions: [2, 3],
          shape: [2, 3],
          usage: window.MLTensorUsage ? window.MLTensorUsage.READ : 'read',
          readable: true
        };
        
        readTensor = await context.createTensor(desc);
        log('createTensor (READ)', true, `Created read tensor with shape [${readTensor.shape}]`);
      } catch (e) {
        log('createTensor (READ) failed', false, e.message);
      }

      // Test 4: readTensor (async)
      try {
        const outputData = await context.readTensor(writeTensor);
        const ok = outputData instanceof Float32Array && outputData.length === 6;
        log('readTensor', ok, `Read ${outputData.length} values`);
        if (ok && outputData.length >= 2) {
          log('readTensor values check', outputData[0] === 1 && outputData[5] === 6, 
              `Values: [${outputData[0]},...,${outputData[5]}]`);
        }
      } catch (e) {
        log('readTensor failed', false, e.message);
      }

      // Test 5: readTensor with existing ArrayBuffer
      try {
        const outputBuffer = new Float32Array(6);
        await context.readTensor(writeTensor, outputBuffer);
        const ok = outputBuffer[0] === 1 && outputBuffer[5] === 6;
        log('readTensor with outputBuffer', ok, `Buffer: [${outputBuffer[0]},...,${outputBuffer[5]}]`);
      } catch (e) {
        log('readTensor with outputBuffer failed', false, e.message);
      }

      // Test 6: createConstantTensor (from example pattern)
      try {
        const constantBuffer = new Float32Array([10, 20, 30, 40]);
        const constantTensor = context.createConstantTensor({
          dataType: 'float32',
          dimensions: [2, 2],
          shape: [2, 2]
        }, constantBuffer);
        log('createConstantTensor', true, 'Created constant tensor');
        
        // Try to read from constant tensor
        const constantValues = await context.readTensor(constantTensor);
        log('read from constant tensor', constantValues.length === 4, `Read ${constantValues.length} values`);
      } catch (e) {
        log('createConstantTensor failed', false, e.message);
      }

      // Test 7: Simple graph with tensors (following example)
      try {
        const builder = new MLGraphBuilder(context);
        
        // Create input descriptors matching example pattern
        const descA = {
          dataType: 'float32',
          dimensions: [2, 2],
          shape: [2, 2]
        };
        const descB = {
          dataType: 'float32',
          dimensions: [2, 2],
          shape: [2, 2]
        };
        
        // Build simple graph: c = a + b
        const a = builder.input('a', descA);
        const b = builder.input('b', descB);
        const c = builder.add(a, b);
        const graph = await builder.build({c});
        log('build simple graph', true, 'Built graph: c = a + b');
        
        // Create tensors for execution
        const tensorA = await context.createTensor({
          ...descA,
          usage: window.MLTensorUsage ? window.MLTensorUsage.WRITE : 'write',
          writable: true
        });
        const tensorB = await context.createTensor({
          ...descB,
          usage: window.MLTensorUsage ? window.MLTensorUsage.WRITE : 'write',
          writable: true
        });
        const tensorC = await context.createTensor({
          dataType: 'float32',
          dimensions: [2, 2],
          shape: [2, 2],
          usage: window.MLTensorUsage ? window.MLTensorUsage.READ : 'read',
          readable: true
        });
        
        // Write data
        const bufferA = new Float32Array([1, 2, 3, 4]);
        const bufferB = new Float32Array([5, 6, 7, 8]);
        context.writeTensor(tensorA, bufferA);
        context.writeTensor(tensorB, bufferB);
        
        // Execute graph
        context.dispatch(graph, {a: tensorA, b: tensorB}, {c: tensorC});
        
        // Read results
        const results = await context.readTensor(tensorC);
        log('graph execution with tensors', results.length === 4, `Got ${results.length} results`);
      } catch (e) {
        log('graph execution test failed', false, e.message);
      }

      // Cleanup
      context.destroy();
      log('Context destroyed', true);

      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      
      // Add note about secure context if tests failed
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost). ';
        note.textContent += 'Run these tests using: python -m http.server 8080 then visit http://localhost:8080/';
        results.appendChild(note);
      }
      
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
