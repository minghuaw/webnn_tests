<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebNN Dispatch – conv2d (3 input channels)</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; }
    .result { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>WebNN Dispatch – conv2d (3 input channels)</h1>
  <div id="results"></div>
  <script>
    'use strict';

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function log(name, passed_, info) {
      const div = document.createElement('div');
      div.className = 'result ' + (passed_ ? 'pass' : 'fail');
      let text = (passed_ ? 'PASS' : 'FAIL') + ': ' + name;
      if (info) text += ' - ' + info;
      div.textContent = text;
      results.appendChild(div);
      if (passed_) passed++; else failed++;
    }

    async function runTests() {
      if (!navigator.ml) { log('WebNN API not available', false); showSummary(); return; }
      log('WebNN API available', true);
      if (!window.isSecureContext) { log('Not in secure context', false); showSummary(); return; }
      log('Secure context OK', true);

      let context;
      try {
        context = await navigator.ml.createContext({});
      } catch (e) {
        log('createContext', false, e.message);
        showSummary();
        return;
      }

      // conv2d with 3 input channels
      // Input: [1, 3, 5, 5] NCHW (3 input channels, 5x5 spatial), all ones
      // Filter: [2, 3, 3, 3] OIHW (2 output channels, 3 input channels, 3x3 kernel), all ones
      // Expected output: [1, 2, 3, 3] = 18 elements, each = 3 * 3 * 3 = 27
      // https://pytorch.org/docs/stable/generated/torch.nn.Conv2d.html
      try {
        const b = new MLGraphBuilder(context);
        const iD = { dataType: 'float32', shape: [1, 3, 5, 5] };
        const fD = { dataType: 'float32', shape: [2, 3, 3, 3] };
        const x = b.input('x', iD);
        const f = b.input('f', fD);
        const o = b.conv2d(x, f, { padding: [0, 0, 0, 0], strides: [1, 1], inputLayout: 'nchw', filterLayout: 'oihw' });
        const g = await b.build({ o });
        const iT = await context.createTensor({ dataType: 'float32', shape: iD.shape, writable: true, readable: false });
        const fT = await context.createTensor({ dataType: 'float32', shape: fD.shape, writable: true, readable: false });
        const oT = await context.createTensor({ dataType: 'float32', shape: o.shape, writable: false, readable: true });
        context.writeTensor(iT, new Float32Array(1 * 3 * 5 * 5).fill(1));
        context.writeTensor(fT, new Float32Array(2 * 3 * 3 * 3).fill(1));
        context.dispatch(g, { x: iT, f: fT }, { o: oT });
        const buf = await context.readTensor(oT);
        const r = new Float32Array(buf);
        const exp = 27; // 3 input channels * 3*3 kernel
        const ok = r.length === 18 && r.every(v => v === exp);
        const s = `Output shape: [${o.shape}], first 3: [${Array.from(r.slice(0, 3)).map(v => v.toFixed(1)).join(', ')}], expected each: ${27}`;
        log('conv2d_3ch', ok, s);
        g.destroy(); iT.destroy(); fT.destroy(); oT.destroy();
      } catch (e) {
        log('conv2d_3ch', false, e.message);
      }

      context.destroy();
      showSummary();
    }

    function showSummary() {
      const summary = document.createElement('div');
      summary.style.marginTop = '20px';
      summary.style.fontWeight = 'bold';
      summary.textContent = 'Results: ' + passed + ' passed, ' + failed + ' failed';
      if (failed > 0 && !window.isSecureContext) {
        const note = document.createElement('div');
        note.style.color = 'orange';
        note.style.marginTop = '10px';
        note.textContent = 'Note: WebNN requires a secure context (HTTPS or localhost).';
        results.appendChild(note);
      }
      results.appendChild(summary);
    }

    runTests();
  </script>
</body>
</html>
